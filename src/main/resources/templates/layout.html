<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="html(content)" class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kafka SQL Explorer</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#25f4f4",
                        "background-light": "#f5f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #283939; border-radius: 10px; }
        .CodeMirror { height: auto; min-height: 300px; font-family: 'JetBrains Mono', monospace; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary/30">
<div class="flex h-screen overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside class="w-64 border-r border-slate-200 dark:border-primary/10 bg-white dark:bg-background-dark flex flex-col shrink-0">
        <div class="p-6 flex flex-col gap-1">
            <h1 class="text-primary text-lg font-bold tracking-tight">Kafka SQL Explorer</h1>
            <p class="text-slate-500 dark:text-primary/60 text-xs uppercase font-bold tracking-widest">Data Infrastructure</p>
        </div>
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto custom-scrollbar">
            <a th:href="@{/}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">dashboard</span>
                <span class="text-sm font-medium">Dashboard</span>
            </a>
            <a th:href="@{/query}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">code</span>
                <span class="text-sm font-medium">SQL Editor</span>
            </a>
            <a th:href="@{/compare}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">compare_arrows</span>
                <span class="text-sm font-medium">Compare</span>
            </a>
            <a th:href="@{/audit}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">assignment</span>
                <span class="text-sm font-medium">Audit</span>
            </a>
            <a th:href="@{/lineage}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">account_tree</span>
                <span class="text-sm font-medium">Lineage</span>
            </a>
            <a th:href="@{/stream-flow}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">waves</span>
                <span class="text-sm font-medium">Stream Flow</span>
            </a>
            <div class="pt-4 pb-2">
                <p class="px-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">System</p>
            </div>
            <a th:href="@{/config}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">settings</span>
                <span class="text-sm font-medium">Config</span>
            </a>
            <a th:href="@{/help}" class="flex items-center gap-3 px-3 py-2 rounded-lg group transition-colors text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-primary/5 hover:text-primary">
                <span class="material-symbols-outlined text-[22px]">help</span>
                <span class="text-sm font-medium">Help</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-200 dark:border-primary/10">
            <div class="flex items-center gap-3 px-2 py-2">
                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-sm">person</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-bold truncate">Admin User</p>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 truncate">admin@explorer.io</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Top Bar -->
        <header class="h-14 border-b border-slate-200 dark:border-primary/10 bg-white dark:bg-background-dark flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-1 rounded-full border" th:classappend="${health != false ? 'bg-emerald-500/10 border-emerald-500/20' : 'bg-red-500/10 border-red-500/20'}">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" th:classappend="${health != false ? 'bg-emerald-400' : 'bg-red-400'}"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2" th:classappend="${health != false ? 'bg-emerald-500' : 'bg-red-500'}"></span>
                    </span>
                    <span class="text-xs font-bold uppercase tracking-wider" th:classappend="${health != false ? 'text-emerald-500' : 'text-red-500'}" th:text="${health != false ? 'Connected' : 'Disconnected'}">Connected</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-slate-100 dark:bg-primary/5 rounded-lg px-3 py-1.5 border border-slate-200 dark:border-primary/10">
                    <span class="material-symbols-outlined text-slate-400 text-lg mr-2">search</span>
                    <input id="globalSearch" class="bg-transparent border-none focus:ring-0 text-sm w-48 p-0" placeholder="Global search..." type="text"/>
                </div>
                <button class="p-2 text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <a th:href="@{/config}" class="p-2 text-slate-500 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined">settings</span>
                </a>
            </div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto custom-scrollbar">
            <div th:replace="${content} ?: ~{}"></div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/hint/sql-hint.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/editor.js}"></script>
</body>
</html>
