<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head>
    <title>Dashboard</title>
</head>
<body th:fragment="content">
    <div class="row mb-4">
        <div class="col">
            <h1 class="h3 text-teal fw-bold">Topics</h1>
            <p class="text-muted small">Explore and query Kafka topics with Flink SQL</p>
        </div>
        <div class="col-md-4">
            <input type="text" id="topicSearch" class="form-control bg-dark border-secondary text-light" placeholder="Search topics...">
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card bg-dark border-secondary shadow-sm">
        <div class="card-body p-0">
            <table class="table table-dark table-hover table-sm mb-0">
                <thead>
                    <tr>
                        <th class="text-teal small py-3 px-4">TOPIC NAME</th>
                        <th class="text-teal small py-3 text-end">FORMAT</th>
                        <th class="text-teal small py-3 text-end px-4">ACTION</th>
                    </tr>
                </thead>
                <tbody id="topicList">
                    <tr th:each="topic : ${topics}" class="topic-row">
                        <td class="py-3 px-4 fw-bold text-light" th:text="${topic}">topic-name</td>
                        <td class="py-3 text-end">
                            <span class="badge rounded-pill bg-outline-teal border border-teal text-teal small">AUTO</span>
                        </td>
                        <td class="py-3 text-end px-4">
                            <a th:href="@{'/topic/' + ${topic}}" class="btn btn-outline-teal btn-sm">Explore</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
