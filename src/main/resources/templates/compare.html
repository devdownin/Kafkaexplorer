<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::body})}">
<head>
    <title>Compare Topics</title>
</head>
<body th:fragment="content">
<main class="flex-1 flex flex-col p-4 gap-4 overflow-hidden h-[calc(100vh-3.5rem)]">
    <!-- SQL Editor Section -->
    <section class="flex flex-col shrink-0">
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-sm">terminal</span>
                <span class="text-xs font-mono uppercase tracking-widest text-slate-400">Shared Query Context</span>
            </div>
        </div>
        <div class="flex flex-col border border-slate-200 dark:border-primary/20 rounded-xl overflow-hidden bg-white dark:bg-[#0d1a1a]">
            <div class="flex bg-slate-50 dark:bg-primary/5 px-4 py-2 border-b border-slate-200 dark:border-primary/10 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <span class="material-symbols-outlined text-xs">database</span> Active Comparison
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="syncTime" class="rounded size-3 border-slate-300 dark:border-primary/20 bg-white dark:bg-background-dark text-primary focus:ring-primary/50">
                        <label for="syncTime" class="text-[10px] font-bold text-slate-500 uppercase">Sync Time</label>
                    </div>
                    <div class="h-4 w-px bg-slate-200 dark:bg-primary/20"></div>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] uppercase text-slate-500 font-bold">Diff Key:</span>
                        <input type="text" id="diffIdCol" class="bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/20 rounded px-2 py-0.5 text-[10px] focus:ring-1 focus:ring-primary outline-none text-primary dark:text-primary w-24" placeholder="e.g. id"/>
                    </div>
                </div>
            </div>
            <div class="flex flex-col bg-[#011627] min-h-[120px]">
                <textarea id="sqlEditor" class="opacity-0">SELECT * FROM {topic}</textarea>
            </div>
            <div class="flex justify-between items-center p-3 bg-primary/5 border-t border-primary/10">
                <div class="flex items-center gap-4">
                    <p class="text-[10px] text-slate-500 italic">Use {topic} as placeholder</p>
                </div>
                <button id="runCompare" class="flex items-center gap-2 px-6 py-2 bg-primary text-background-dark font-bold rounded-lg hover:brightness-110 transition-all text-sm">
                    <span class="material-symbols-outlined text-lg">compare_arrows</span> RUN COMPARE
                </button>
            </div>
        </div>
    </section>

    <!-- Side-by-Side Message Views -->
    <section class="flex-1 flex gap-4 overflow-hidden min-h-0">
        <!-- Topic 1 View -->
        <div class="flex-1 flex flex-col border border-slate-200 dark:border-primary/20 rounded-xl bg-white dark:bg-[#0d1a1a] overflow-hidden">
            <div class="p-3 border-b border-slate-200 dark:border-primary/10 flex flex-col gap-2 bg-slate-50 dark:bg-primary/5">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-primary uppercase">Topic 1 (Source)</span>
                    <div id="stats1" class="text-[10px] text-slate-500 hidden">
                        <span id="count1">0</span> messages | <span id="tps1">0</span> msg/s
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="topic1Filter" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] focus:ring-1 focus:ring-primary outline-none" placeholder="Filter topics..."/>
                    <select id="topic1Select" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/20 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-primary outline-none text-slate-900 dark:text-slate-200">
                        <option value="">-- Select Topic --</option>
                        <option th:each="topic : ${topics}" th:value="${topic}" th:text="${topic}"></option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="datetime-local" id="start1" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] text-slate-600 dark:text-slate-400"/>
                    <input type="datetime-local" id="end1" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] text-slate-600 dark:text-slate-400"/>
                </div>
            </div>
            <div id="results1" class="flex-1 overflow-y-auto custom-scrollbar p-0" style="display: none;">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white dark:bg-background-dark/95 backdrop-blur-sm z-10">
                        <tr id="header1" class="border-bottom border-slate-200 dark:border-primary/10"></tr>
                    </thead>
                    <tbody id="body1" class="divide-y divide-slate-100 dark:divide-primary/5"></tbody>
                </table>
            </div>
        </div>

        <!-- Topic 2 View -->
        <div class="flex-1 flex flex-col border border-slate-200 dark:border-primary/20 rounded-xl bg-white dark:bg-[#0d1a1a] overflow-hidden">
            <div class="p-3 border-b border-slate-200 dark:border-primary/10 flex flex-col gap-2 bg-slate-50 dark:bg-primary/5">
                <div class="flex items-center justify-between">
                    <span class="text-[10px] font-bold text-primary uppercase">Topic 2 (Target)</span>
                    <div id="stats2" class="text-[10px] text-slate-500 hidden">
                        <span id="count2">0</span> messages | <span id="tps2">0</span> msg/s
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="topic2Filter" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] focus:ring-1 focus:ring-primary outline-none" placeholder="Filter topics..."/>
                    <select id="topic2Select" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/20 rounded px-2 py-1 text-xs focus:ring-1 focus:ring-primary outline-none text-slate-900 dark:text-slate-200">
                        <option value="">-- Select Topic --</option>
                        <option th:each="topic : ${topics}" th:value="${topic}" th:text="${topic}"></option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="datetime-local" id="start2" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] text-slate-600 dark:text-slate-400"/>
                    <input type="datetime-local" id="end2" class="flex-1 bg-white dark:bg-background-dark border border-slate-300 dark:border-primary/10 rounded px-2 py-1 text-[10px] text-slate-600 dark:text-slate-400"/>
                </div>
            </div>
            <div id="results2" class="flex-1 overflow-y-auto custom-scrollbar p-0" style="display: none;">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white dark:bg-background-dark/95 backdrop-blur-sm z-10">
                        <tr id="header2" class="border-bottom border-slate-200 dark:border-primary/10"></tr>
                    </thead>
                    <tbody id="body2" class="divide-y divide-slate-100 dark:divide-primary/5"></tbody>
                </table>
            </div>
        </div>
    </section>

    <!-- Footer Summary -->
    <footer class="h-10 border border-slate-200 dark:border-primary/20 rounded-lg flex items-center px-4 bg-slate-50 dark:bg-primary/5 shrink-0 justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400">
        <div class="flex gap-6">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-amber-500"></div>
                <span>Diff Highlighted</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-slate-700"></div>
                <span>Missing Record</span>
            </div>
        </div>
        <div class="flex gap-4">
            <span class="material-symbols-outlined text-sm cursor-pointer hover:text-primary">download</span>
        </div>
    </footer>
</main>

<style>
    .diff-changed { background-color: rgba(245, 158, 11, 0.1) !important; color: #fbbf24 !important; }
    .diff-missing { background-color: rgba(255, 255, 255, 0.05); border-left: 2px solid #475569; }
    .CodeMirror { height: 120px !important; min-height: 120px !important; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const editor = CodeMirror.fromTextArea(document.getElementById('sqlEditor'), {
            mode: 'text/x-sql',
            theme: 'material-darker',
            lineNumbers: true,
            indentWithTabs: true,
            smartIndent: true,
            matchBrackets: true,
            viewportMargin: Infinity,
            extraKeys: { "Ctrl-Space": "autocomplete" }
        });

        const registeredTopics = new Set();
        let lastResults = { 1: null, 2: null };

        // Time Synchronization
        document.getElementById('syncTime').addEventListener('change', (e) => {
            if (e.target.checked) {
                document.getElementById('start2').value = document.getElementById('start1').value;
                document.getElementById('end2').value = document.getElementById('end1').value;
            }
        });

        document.getElementById('start1').addEventListener('input', (e) => {
            if (document.getElementById('syncTime').checked) {
                document.getElementById('start2').value = e.target.value;
            }
        });

        document.getElementById('end1').addEventListener('input', (e) => {
            if (document.getElementById('syncTime').checked) {
                document.getElementById('end2').value = e.target.value;
            }
        });

        // Topic Filtering
        const setupFilter = (filterId, selectId) => {
            const filter = document.getElementById(filterId);
            const select = document.getElementById(selectId);
            const options = Array.from(select.options).slice(1);

            filter.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                options.forEach(opt => {
                    const visible = opt.text.toLowerCase().includes(term);
                    opt.style.display = visible ? '' : 'none';
                });
            });
        };

        setupFilter('topic1Filter', 'topic1Select');
        setupFilter('topic2Filter', 'topic2Select');

        async function ensureTopicRegistered(topicName) {
            if (!topicName || registeredTopics.has(topicName)) return;
            try {
                const ddlResponse = await fetch(`/api/topic/${topicName}/ddl`);
                const ddl = await ddlResponse.text();
                await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql: ddl, maxRows: 1, timeout: 5000 })
                });
                registeredTopics.add(topicName);
            } catch (e) {
                console.error('Failed to register topic ' + topicName, e);
            }
        }

        document.getElementById('runCompare').addEventListener('click', async () => {
            const topic1 = document.getElementById('topic1Select').value;
            const topic2 = document.getElementById('topic2Select').value;
            const template = editor.getValue();

            if (!topic1 || !topic2) {
                alert('Please select two topics');
                return;
            }

            await ensureTopicRegistered(topic1);
            await ensureTopicRegistered(topic2);

            lastResults = { 1: null, 2: null };
            executeTopicQuery(1, topic1, template);
            executeTopicQuery(2, topic2, template);
            executeTopicStats(1, topic1);
            executeTopicStats(2, topic2);
        });

        async function executeTopicStats(index, topic) {
            const statsDiv = document.getElementById(`stats${index}`);
            const countEl = document.getElementById(`count${index}`);
            const tpsEl = document.getElementById(`tps${index}`);

            statsDiv.classList.remove('hidden');
            countEl.textContent = '...';
            tpsEl.textContent = '...';

            const start = document.getElementById(`start${index}`).value;
            const end = document.getElementById(`end${index}`).value;

            let filters = [];
            if (start) filters.push(`event_time >= TO_TIMESTAMP('${start.replace('T', ' ')}:00')`);
            if (end) filters.push(`event_time <= TO_TIMESTAMP('${end.replace('T', ' ')}:00')`);

            let where = filters.length > 0 ? 'WHERE ' + filters.join(' AND ') : '';
            let sql = `SELECT COUNT(*), MIN(event_time), MAX(event_time) FROM ${topic} ${where}`;

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql, maxRows: 1, timeout: 15000 })
                });
                const data = await response.json();
                if (data.rows && data.rows.length > 0) {
                    const row = data.rows[0];
                    const count = row['EXPR$0'];
                    const minTime = new Date(row['EXPR$1']);
                    const maxTime = new Date(row['EXPR$2']);

                    countEl.textContent = count.toLocaleString();

                    if (count > 1 && maxTime > minTime) {
                        const durationSec = (maxTime - minTime) / 1000;
                        const tps = (count / durationSec).toFixed(2);
                        tpsEl.textContent = tps;
                    } else {
                        tpsEl.textContent = '0';
                    }
                }
            } catch (e) {
                countEl.textContent = 'Error';
            }
        }

        async function executeTopicQuery(index, topic, template) {
            const resultsDiv = document.getElementById(`results${index}`);
            const body = document.getElementById(`body${index}`);

            resultsDiv.style.display = 'block';
            body.innerHTML = '<tr><td class="p-4 text-center"><div class="animate-spin inline-block w-4 h-4 border-2 border-primary border-t-transparent rounded-full"></div></td></tr>';

            let sql = template.replace(/{topic}/g, topic);

            const start = document.getElementById(`start${index}`).value;
            const end = document.getElementById(`end${index}`).value;

            const filters = [];
            if (start) filters.push(`event_time >= TO_TIMESTAMP('${start.replace('T', ' ')}:00')`);
            if (end) filters.push(`event_time <= TO_TIMESTAMP('${end.replace('T', ' ')}:00')`);

            if (filters.length > 0) {
                if (sql.toUpperCase().includes('WHERE')) {
                    sql += ' AND ' + filters.join(' AND ');
                } else {
                    sql += ' WHERE ' + filters.join(' AND ');
                }
            }

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sql, maxRows: 50, timeout: 10000 })
                });
                const data = await response.json();

                if (data.error) {
                    body.innerHTML = `<tr><td class="p-4 text-red-400 text-xs">Error: ${data.error}</td></tr>`;
                } else {
                    lastResults[index] = data;
                    renderResults(index, data);
                    if (lastResults[1] && lastResults[2]) {
                        applyDiffHighlighting();
                    }
                }
            } catch (e) {
                body.innerHTML = `<tr><td class="p-4 text-red-400 text-xs">Network Error: ${e.message}</td></tr>`;
            }
        }

        function renderResults(index, data) {
            const header = document.getElementById(`header${index}`);
            const body = document.getElementById(`body${index}`);
            header.innerHTML = '';
            body.innerHTML = '';

            data.columns.forEach(col => {
                const th = document.createElement('th');
                th.textContent = col;
                th.className = 'text-primary text-[10px] uppercase font-bold px-3 py-2 border-b border-primary/10';
                header.appendChild(th);
            });

            data.rows.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-primary/5 transition-colors group';
                data.columns.forEach(col => {
                    const td = document.createElement('td');
                    td.className = 'text-slate-300 text-xs font-mono px-3 py-2';
                    let val = row[col];
                    if (val === null) val = 'NULL';
                    td.textContent = val;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });

            if (data.rows.length === 0) {
                body.innerHTML = '<tr><td colspan="100%" class="p-4 text-center text-slate-500 text-xs">No data found</td></tr>';
            }
        }

        function applyDiffHighlighting() {
            const idCol = document.getElementById('diffIdCol').value.trim();
            if (!idCol) return;

            const res1 = lastResults[1];
            const res2 = lastResults[2];

            const findRowById = (data, id) => {
                return data.rows.find(r => String(r[idCol]) === String(id));
            };

            const body1 = document.getElementById('body1');
            const body2 = document.getElementById('body2');

            Array.from(body1.rows).forEach((row, i) => {
                const rowData = res1.rows[i];
                if (!rowData) return;
                const idValue = rowData[idCol];
                const otherRow = findRowById(res2, idValue);

                if (otherRow) {
                    res1.columns.forEach((col, j) => {
                        if (rowData[col] !== otherRow[col]) {
                            row.cells[j].classList.add('diff-changed');
                        }
                    });
                } else {
                    row.classList.add('diff-missing');
                }
            });

            Array.from(body2.rows).forEach((row, i) => {
                const rowData = res2.rows[i];
                if (!rowData) return;
                const idValue = rowData[idCol];
                const otherRow = findRowById(res1, idValue);

                if (otherRow) {
                    res2.columns.forEach((col, j) => {
                        if (rowData[col] !== otherRow[col]) {
                            row.cells[j].classList.add('diff-changed');
                        }
                    });
                } else {
                    row.classList.add('diff-missing');
                }
            });
        }
    });
</script>
</body>
</html>
