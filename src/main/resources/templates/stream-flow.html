<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::body})}">
<body>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-route text-teal"></i> Stream Flow</h2>
    </div>

    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card bg-dark border-secondary">
                <div class="card-body">
                    <form id="flow-form" class="row g-3">
                        <div class="col-md-4">
                            <label for="messageKey" class="form-label">Search Value / Regex</label>
                            <div class="input-group">
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="messageKey" placeholder="e.g. order-.*" required>
                                <div class="input-group-text bg-dark border-secondary">
                                    <input class="form-check-input mt-0" type="checkbox" id="useRegex" title="Use Regular Expression">
                                    <label class="form-check-label ms-2 text-muted small" for="useRegex">Regex</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label for="searchPath" class="form-label">Search Path (JSONPath or XPath)</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary" id="searchPath" placeholder="e.g. $.id or /order/id">
                        </div>
                        <div class="col-md-4">
                            <label for="targetTopics" class="form-label">Scan Specific Topics (Optional)</label>
                            <select class="form-select bg-dark text-light border-secondary" id="targetTopics" multiple size="3">
                                <!-- Populated via JS -->
                            </select>
                            <div class="form-text text-muted small">Hold Ctrl/Cmd to select multiple</div>
                        </div>
                        <div class="col-md-3">
                            <label for="timeLimit" class="form-label">Time Limit (minutes)</label>
                            <input type="number" class="form-control bg-dark text-light border-secondary" id="timeLimit" placeholder="e.g. 60">
                        </div>
                        <div class="col-md-3">
                            <label for="maxMessages" class="form-label">Scan Limit (msgs/topic)</label>
                            <input type="number" class="form-control bg-dark text-light border-secondary" id="maxMessages" value="100" min="1" max="1000">
                        </div>
                        <div class="col-md-6 text-end d-flex align-items-end justify-content-end">
                            <button type="submit" class="btn btn-teal">
                                <i class="fas fa-search"></i> Trace Flow
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card bg-dark border-secondary">
                <div class="card-body p-0" style="height: 600px; position: relative; overflow: hidden;">
                    <div id="flow-container" style="width: 100%; height: 100%; background-color: #1a1a1a;"></div>
                    <div id="loading-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark opacity-75 d-none">
                        <div class="text-center">
                            <div class="spinner-border text-teal mb-2" role="status"></div>
                            <p class="text-teal" id="loading-text">Scanning topics and tracing messages...</p>
                        </div>
                    </div>
                    <div id="empty-state" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center">
                        <div class="text-center text-muted">
                            <i class="fas fa-route fa-3x mb-3 opacity-25"></i>
                            <p>Enter search criteria and click "Trace Flow" to visualize message propagation</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- cytoscape.js for graph rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Populate topics
            fetch('/api/topics')
                .then(response => response.json())
                .then(topics => {
                    const select = document.getElementById('targetTopics');
                    topics.sort().forEach(topic => {
                        const opt = document.createElement('option');
                        opt.value = topic;
                        opt.textContent = topic;
                        select.appendChild(opt);
                    });
                });
        });

        document.getElementById('flow-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const messageKey = document.getElementById('messageKey').value;
            const searchPath = document.getElementById('searchPath').value;
            const timeLimit = document.getElementById('timeLimit').value;
            const maxMessages = document.getElementById('maxMessages').value;
            const useRegex = document.getElementById('useRegex').checked;
            const targetTopics = Array.from(document.getElementById('targetTopics').selectedOptions).map(o => o.value);

            traceFlow(messageKey, searchPath, timeLimit, maxMessages, useRegex, targetTopics);
        });

        function traceFlow(key, path, time, max, regex, topics) {
            document.getElementById('loading-overlay').classList.remove('d-none');
            document.getElementById('empty-state').classList.add('d-none');

            fetch('/api/stream-flow', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    messageKey: key,
                    searchPath: path,
                    timeLimitMinutes: time ? parseInt(time) : null,
                    maxMessagesPerTopic: parseInt(max),
                    useRegex: regex,
                    targetTopics: topics
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading-overlay').classList.add('d-none');
                if (data.nodes.length === 0) {
                    document.getElementById('empty-state').classList.remove('d-none');
                    document.getElementById('empty-state').innerHTML = `
                        <div class="text-center text-warning">
                            <i class="fas fa-exclamation-triangle fa-3x mb-3 opacity-25"></i>
                            <p>No messages found matching your criteria.</p>
                            <button class="btn btn-sm btn-outline-secondary" onclick="resetState()">Try again</button>
                        </div>`;
                } else {
                    renderGraph(data);
                }
            })
            .catch(error => {
                console.error('Error tracing flow:', error);
                document.getElementById('loading-overlay').classList.add('d-none');
            });
        }

        function resetState() {
            document.getElementById('empty-state').innerHTML = `
                <div class="text-center text-muted">
                    <i class="fas fa-route fa-3x mb-3 opacity-25"></i>
                    <p>Enter search criteria and click "Trace Flow" to visualize message propagation</p>
                </div>`;
        }

        function renderGraph(data) {
            const elements = [];

            // Add nodes
            data.nodes.forEach(node => {
                elements.push({
                    data: {
                        id: node.id,
                        label: node.label,
                        color: '#007bff',
                        icon: '\uf1c0'
                    }
                });
            });

            // Add edges
            data.edges.forEach((edge, index) => {
                elements.push({
                    data: {
                        id: 'edge_' + index,
                        source: edge.from,
                        target: edge.to,
                        label: (index + 1).toString()
                    }
                });
            });

            const cy = cytoscape({
                container: document.getElementById('flow-container'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': 'data(color)',
                            'color': '#fff',
                            'text-valign': 'bottom',
                            'text-margin-y': '5px',
                            'font-size': '12px',
                            'width': '40px',
                            'height': '40px',
                            'content': 'data(label)'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 3,
                            'line-color': '#0dcaf0',
                            'target-arrow-color': '#0dcaf0',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'label': 'data(label)',
                            'font-size': '14px',
                            'font-weight': 'bold',
                            'color': '#fff',
                            'text-background-color': '#0dcaf0',
                            'text-background-opacity': 1,
                            'text-background-padding': '3px',
                            'text-background-shape': 'roundrectangle'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 50,
                    spacingFactor: 1.5
                }
            });
        }
    </script>
</body>
</html>
