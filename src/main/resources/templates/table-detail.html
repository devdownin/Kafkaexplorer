<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::body})}">
<head>
    <title th:text="'Table: ' + ${tableName}">Table Detail</title>
</head>
<body th:fragment="content">
<div class="p-6 space-y-8">
    <!-- Breadcrumb & Title -->
    <div class="space-y-4">
        <div class="flex items-center gap-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
            <a href="/" class="hover:text-primary transition-colors">Dashboard</a>
            <span class="material-symbols-outlined text-xs">chevron_right</span>
            <span class="text-primary" th:text="${tableName}">table_name</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-100 flex items-center gap-3">
            <span class="material-symbols-outlined text-primary text-3xl">grid_view</span>
            <span th:text="${tableName}">table-name</span>
        </h1>
    </div>

    <!-- Schema Section -->
    <section class="space-y-4">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2 px-2">
            <span class="material-symbols-outlined text-primary text-base">list_alt</span>
            Table Schema
        </h2>
        <div class="bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 dark:bg-primary/10 text-[10px] font-bold text-slate-500 dark:text-primary/70 uppercase tracking-wider border-b border-slate-200 dark:border-primary/10">
                        <th class="px-6 py-4">Column Name</th>
                        <th class="px-6 py-4 text-right">Type</th>
                    </tr>
                </thead>
                <tbody class="text-xs divide-y divide-slate-100 dark:divide-primary/5">
                    <tr th:each="entry : ${schema}" class="hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors">
                        <td class="px-6 py-4 font-bold text-slate-200" th:text="${entry.key}">column_name</td>
                        <td class="px-6 py-4 text-right font-mono text-slate-400" th:text="${entry.value}">STRING</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- Preview Section -->
    <section class="space-y-4">
        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2 px-2">
            <span class="material-symbols-outlined text-primary text-base">visibility</span>
            Data Preview (First 10 rows)
        </h2>

        <div th:if="${preview.error}" class="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-500 text-xs" th:text="${preview.error}"></div>

        <div class="bg-white dark:bg-primary/5 border border-slate-200 dark:border-primary/10 rounded-xl overflow-hidden shadow-sm">
            <div class="overflow-x-auto custom-scrollbar max-h-[500px]">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="sticky top-0 bg-background-dark/95 backdrop-blur-sm z-10">
                        <tr class="border-b border-primary/10">
                            <th th:each="col : ${preview.columns}" th:text="${col}" class="px-4 py-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">COL</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs divide-y divide-slate-100 dark:divide-primary/5">
                        <tr th:each="row : ${preview.rows}" class="hover:bg-slate-50 dark:hover:bg-primary/5 transition-colors">
                            <td th:each="col : ${preview.columns}" class="px-4 py-3 text-slate-300 font-mono">
                                <pre class="whitespace-pre-wrap leading-relaxed" th:text="${row[col]}">value</pre>
                            </td>
                        </tr>
                        <tr th:if="${preview.rows.isEmpty()}">
                            <td th:colspan="${preview.columns.size()}" class="px-6 py-20 text-center">
                                <span class="material-symbols-outlined text-4xl text-slate-600 mb-4">search_off</span>
                                <p class="text-xs font-bold uppercase tracking-widest text-slate-500">No data found or timeout</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
</body>
</html>
