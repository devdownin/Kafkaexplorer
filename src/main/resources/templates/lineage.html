<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-project-diagram text-teal"></i> Query Lineage</h2>
        <button class="btn btn-outline-teal btn-sm" onclick="loadLineage()">
            <i class="fas fa-sync"></i> Refresh
        </button>
    </div>

    <div class="card bg-dark border-secondary">
        <div class="card-body p-0" style="height: 700px; position: relative; overflow: hidden;">
            <div id="lineage-container" style="width: 100%; height: 100%; background-color: #1a1a1a;"></div>
            <div id="loading-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center bg-dark opacity-75">
                <div class="spinner-border text-teal" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <h5>Legend:</h5>
        <span class="badge bg-primary me-2"><i class="fas fa-database"></i> Kafka Topic</span>
        <span class="badge bg-success me-2"><i class="fas fa-table"></i> Flink Table</span>
        <span class="badge bg-info me-2"><i class="fas fa-eye"></i> Flink View</span>
        <span class="badge bg-warning text-dark me-2"><i class="fas fa-bolt"></i> Active Query</span>
    </div>

    <!-- cytoscape.js for graph rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script>
        function loadLineage() {
            document.getElementById('loading-overlay').classList.remove('d-none');
            fetch('/api/lineage')
                .then(response => response.json())
                .then(data => {
                    renderGraph(data);
                    document.getElementById('loading-overlay').classList.add('d-none');
                })
                .catch(error => {
                    console.error('Error loading lineage:', error);
                    document.getElementById('loading-overlay').classList.add('d-none');
                });
        }

        function renderGraph(data) {
            const elements = [];

            // Add nodes
            data.nodes.forEach(node => {
                let color = '#007bff'; // Default topic
                let icon = '\uf1c0'; // database icon

                if (node.type === 'table') {
                    color = '#198754';
                    icon = '\uf0ce'; // table icon
                } else if (node.type === 'view') {
                    color = '#0dcaf0';
                    icon = '\uf06e'; // eye icon
                } else if (node.type === 'query') {
                    color = '#ffc107';
                    icon = '\uf0e7'; // bolt icon
                }

                elements.push({
                    data: {
                        id: node.id,
                        label: node.label,
                        color: color,
                        icon: icon,
                        type: node.type
                    }
                });
            });

            // Add edges
            data.edges.forEach(edge => {
                elements.push({
                    data: {
                        source: edge.from,
                        target: edge.to,
                        label: edge.label
                    }
                });
            });

            const cy = cytoscape({
                container: document.getElementById('lineage-container'),
                elements: elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': 'data(color)',
                            'color': '#fff',
                            'text-valign': 'bottom',
                            'text-margin-y': '5px',
                            'font-size': '12px',
                            'width': '40px',
                            'height': '40px',
                            'content': 'data(label)'
                        }
                    },
                    {
                        selector: 'node[type="query"]',
                        style: {
                            'shape': 'diamond'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#6c757d',
                            'target-arrow-color': '#6c757d',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier',
                            'label': 'data(label)',
                            'font-size': '10px',
                            'color': '#adb5bd',
                            'text-rotation': 'autorotate',
                            'text-margin-y': '-10px'
                        }
                    }
                ],
                layout: {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 50,
                    spacingFactor: 1.5
                }
            });

            cy.on('tap', 'node', function(evt){
                const node = evt.target;
                console.log('Tapped ' + node.id());
            });
        }

        document.addEventListener('DOMContentLoaded', loadLineage);
    </script>
</section>
</body>
</html>
